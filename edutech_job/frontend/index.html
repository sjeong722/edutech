<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCareer AI | 에듀테크 신입 채용 브리핑</title>
    <meta name="description" content="매일 아침 배달되는 에듀테크 신입 맞춤형 채용 공고 및 자소서 전략 브리핑">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="brand-icon">✦</span>
                <h1 class="brand">EduCareer AI</h1>
            </div>
            <div class="topbar-right">
                <span class="badge" id="user-badge">신입 지원자</span>
                <button class="btn-refresh" id="refresh-btn">↻ 새로고침</button>
            </div>
        </header>

        <!-- Hero Bento Section -->
        <section class="bento-hero">
            <div class="bento-card hero-title-card">
                <p class="hero-label">오늘의 브리핑</p>
                <h2 class="hero-date" id="current-date"></h2>
                <p class="hero-sub">사람인 · 원티드에서 자동 수집된<br>서울 정규직 · 신입~3년 이하 공고</p>
            </div>
            <div class="bento-card stat-card stat-total">
                <p class="stat-label">수집된 공고</p>
                <p class="stat-number" id="count-total">—</p>
                <p class="stat-unit">건</p>
            </div>
            <div class="bento-card stat-card stat-plan">
                <p class="stat-label">기획</p>
                <p class="stat-number" id="count-planning">—</p>
            </div>
            <div class="bento-card stat-card stat-mkt">
                <p class="stat-label">마케팅</p>
                <p class="stat-number" id="count-marketing">—</p>
            </div>
            <div class="bento-card stat-card stat-lms">
                <p class="stat-label">LMS</p>
                <p class="stat-number" id="count-lms">—</p>
            </div>
            <div class="bento-card stat-card stat-content">
                <p class="stat-label">콘텐츠</p>
                <p class="stat-number" id="count-content">—</p>
            </div>
            <div class="bento-card keyword-card">
                <p class="kw-label">🔑 검색 키워드</p>
                <div class="kw-chips">
                    <span>에듀테크 기획</span><span>에듀테크 마케팅</span>
                    <span>에듀테크 LMS</span><span>이러닝 기획</span>
                    <span>이러닝 마케팅</span><span>에듀테크 콘텐츠</span>
                </div>
            </div>
        </section>

        <!-- Filter -->
        <section class="filter-bar">
            <h3>✨ 스크래핑 결과</h3>
            <div class="filter-pills">
                <button class="pill active" data-filter="전체">전체</button>
                <button class="pill" data-filter="기획">기획</button>
                <button class="pill" data-filter="마케팅">마케팅</button>
                <button class="pill" data-filter="LMS">LMS</button>
                <button class="pill" data-filter="콘텐츠">콘텐츠</button>
            </div>
        </section>

        <!-- Loading -->
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <p>채용 공고를 수집하고 있습니다...</p>
        </div>

        <!-- Job Grid (Bento) -->
        <section class="job-grid" id="job-list-section" style="display:none;">
            <div id="job-list"></div>
        </section>

        <!-- Empty -->
        <div class="empty-state" id="empty-state" style="display:none;">
            <p>😔 조건에 맞는 공고를 찾지 못했습니다.</p>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 시대, 인간다움 교육과정 챗봇</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #647084;
      --line: #d9e2ec;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --primary: #1769aa;
      --primary-dark: #0f4f86;
      --accent: #1f9d8a;
      --soft-blue: #e8f4ff;
      --soft-green: #eaf8f3;
      --soft-yellow: #fff6db;
      --danger: #b42318;
      --shadow: 0 18px 42px rgba(28, 43, 69, 0.10);
      --radius: 18px;
      font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, #eef5fb 0, #f7f9fc 38%, #eef3f8 100%);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      align-items: stretch;
      gap: 18px;
    }

    .sidebar,
    .chat-shell {
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(217, 226, 236, 0.95);
      box-shadow: var(--shadow);
    }

    .sidebar {
      border-radius: var(--radius);
      padding: 22px;
      align-self: start;
      position: sticky;
      top: 24px;
    }

    .brand {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand .mascot {
      display: none;
    }

    .brand::before {
      content: "AI";
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: #17324d;
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: inset 0 -6px 0 rgba(255, 255, 255, 0.08);
    }

    .mascot {
      position: relative;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: #dff1ff;
      border: 1px solid #b8def7;
    }

    .mascot-small {
      width: 54px;
      height: 54px;
    }

    .mascot-mini {
      width: 34px;
      height: 34px;
      border-radius: 12px;
    }

    .robot-antenna,
    .robot-headset,
    .robot-body {
      display: none;
    }

    .robot-face {
      position: absolute;
      inset: 9px;
      border-radius: 10px;
      background: #fff;
      box-shadow: none;
    }

    .robot-screen {
      position: absolute;
      inset: 4px;
      border-radius: 8px;
      background: #4b9ed8;
    }

    .robot-eye {
      position: absolute;
      top: 35%;
      width: 12%;
      height: 20%;
      border-radius: 999px;
      background: #fff;
    }

    .robot-eye.left {
      left: 28%;
    }

    .robot-eye.right {
      right: 28%;
    }

    .robot-mouth {
      position: absolute;
      left: 40%;
      top: 62%;
      width: 20%;
      height: 8%;
      border-radius: 999px;
      background: #fff;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .course-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 16px 0 18px;
    }

    .course-stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbfd;
    }

    .course-stat strong {
      display: block;
      font-size: 17px;
      line-height: 1.1;
    }

    .course-stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .field {
      margin-top: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      outline-color: #8cc7f2;
    }

    .persona-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .persona {
      min-height: 72px;
      display: grid;
      align-content: center;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px 12px;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }

    .persona[aria-pressed="true"] {
      border-color: #66aee1;
      background: var(--soft-blue);
      box-shadow: inset 0 0 0 1px #66aee1;
    }

    .persona span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .summary-box {
      margin-top: 18px;
      padding: 15px;
      border-radius: 14px;
      background: #f0f8fb;
      border: 1px solid #c7e7f5;
    }

    .summary-box h2 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .summary-box p {
      margin: 0;
      color: #245a76;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .chat-shell {
      min-height: calc(100vh - 56px);
      border-radius: 22px;
      display: grid;
      grid-template-rows: auto auto minmax(340px, 1fr) auto;
      overflow: hidden;
      width: 100%;
    }

    .chat-top {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .chat-title {
      text-align: left;
    }

    .chat-top h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #236247;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #24a148;
    }

    .messages {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fbfdff;
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message {
      width: auto;
      max-width: min(76%, 560px);
      border: 1px solid #e1e8ef;
      border-radius: 18px 18px 18px 6px;
      padding: 13px 15px;
      line-height: 1.65;
      background: #f1f5f8;
      box-shadow: none;
      white-space: pre-line;
      font-size: 14px;
    }

    .message.bot {
      color: #364456;
    }

    .message.user {
      border-color: #1769aa;
      border-radius: 18px 18px 6px 18px;
      background: #1769aa;
      color: #fff;
    }

    .message strong {
      display: none;
    }

    .message.typing {
      color: var(--muted);
      font-style: italic;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 24px;
      background: #f7fbff;
      border-bottom: 1px solid var(--line);
    }

    .chip {
      border: 1px solid #c9e3f6;
      border-radius: 999px;
      padding: 8px 12px;
      background: #ffffff;
      color: #17608f;
      font-size: 12px;
      white-space: nowrap;
    }

    .chip:hover {
      background: var(--soft-blue);
    }

    .composer {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .composer-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 120px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      color: var(--ink);
      outline-color: #8cc7f2;
      line-height: 1.45;
    }

    .send,
    .quick-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      padding: 0;
      font-weight: 800;
    }

    .send {
      border: 0;
      background: var(--primary);
      color: #fff;
    }

    .quick-icon {
      border: 1px solid #c9e3f6;
      background: #fff;
      color: var(--primary);
      font-size: 22px;
      line-height: 1;
    }

    .send span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    .send::before {
      content: "↑";
      font-size: 22px;
      line-height: 1;
    }

    .send:hover {
      background: var(--primary-dark);
    }

    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tool {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 11px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
    }

    .notice {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: var(--soft-yellow);
      color: #6b5200;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .app {
        width: min(100% - 20px, 720px);
        grid-template-columns: 1fr;
        padding: 12px 0;
      }

      .sidebar {
        position: static;
        order: 2;
      }

      .chat-shell {
        order: 1;
        min-height: 74vh;
      }

      .persona-list {
        grid-template-columns: 1fr;
      }

      .message {
        max-width: 86%;
      }

      .chat-top {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .chat-top .mascot {
        display: none;
      }
    }

  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="상담 정보">
      <div class="brand">
        <div class="mascot mascot-small" aria-hidden="true">
          <span class="robot-antenna"></span>
          <span class="robot-headset"></span>
          <span class="robot-face">
            <span class="robot-screen">
              <span class="robot-eye left"></span>
              <span class="robot-eye right"></span>
              <span class="robot-mouth"></span>
            </span>
          </span>
          <span class="robot-body"></span>
        </div>
        <div>
          <h1>인간다움 교육과정 상담</h1>
          <p class="subtitle">'AI 시대, 인간다움은 무엇일까?' 10차시 과정의 운영과 도입을 안내합니다.</p>
        </div>
      </div>

      <div class="course-strip" aria-label="과정 핵심 정보">
        <div class="course-stat"><strong>10차시</strong><span>회차당 45분</span></div>
        <div class="course-stat"><strong>20명</strong><span>1학급 기준</span></div>
        <div class="course-stat"><strong>3.08M</strong><span>예산 예시</span></div>
      </div>

      <div class="field">
        <label for="studentName">상담 대상</label>
        <input id="studentName" type="text" placeholder="예: 중학교 1학년, 학부모, 진로 담당 교사">
      </div>

      <div class="field">
        <label for="goal">상담 주제</label>
        <select id="goal">
          <option value="과정 개요">과정 개요</option>
          <option value="10차시 커리큘럼">10차시 커리큘럼</option>
          <option value="학교 도입">학교 도입</option>
          <option value="수업 활동">수업 활동</option>
          <option value="평가/성과">평가/성과</option>
          <option value="예산/운영">예산/운영</option>
        </select>
      </div>

      <div class="field">
        <label>상담 모드</label>
        <div class="persona-list">
          <button class="persona" data-persona="student" aria-pressed="true">학생 안내 <span>쉽게</span></button>
          <button class="persona" data-persona="parent" aria-pressed="false">학부모 안내 <span>안심</span></button>
          <button class="persona" data-persona="worker" aria-pressed="false">교사 운영 <span>수업형</span></button>
          <button class="persona" data-persona="school" aria-pressed="false">학교 도입 <span>제안형</span></button>
        </div>
      </div>

      <div class="summary-box">
        <h2>상담 요약</h2>
        <p id="summary">대화를 시작하면 대상, 상담 주제, 필요한 운영 정보가 정리됩니다.</p>
      </div>

      <div class="notice">개인정보, 성적표, 연락처 같은 민감한 정보는 입력하지 않는 편이 좋습니다.</div>
    </aside>

    <section class="chat-shell" aria-label="챗봇 대화">
      <header class="chat-top">
        <span class="status">상담 가능</span>
        <div class="chat-title">
          <h2>AI 시대, 인간다움 상담봇</h2>
          <p class="subtitle">오늘 14:29 마지막 상담</p>
        </div>
        <div class="mascot mascot-mini" aria-hidden="true">
          <span class="robot-antenna"></span>
          <span class="robot-headset"></span>
          <span class="robot-face">
            <span class="robot-screen">
              <span class="robot-eye left"></span>
              <span class="robot-eye right"></span>
              <span class="robot-mouth"></span>
            </span>
          </span>
          <span class="robot-body"></span>
        </div>
      </header>

      <div class="chips" aria-label="빠른 질문">
        <button class="chip">10차시 커리큘럼을 한눈에 정리해줘</button>
        <button class="chip">학교에 제안할 때 핵심 설득 포인트는 뭐야?</button>
        <button class="chip">ThinkGym은 수업에서 어떻게 활용돼?</button>
        <button class="chip">평가 방식과 산출물을 설명해줘</button>
        <button class="chip">1학급 20명 기준 예산을 알려줘</button>
      </div>

      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="chatForm" class="composer">
        <div class="composer-row">
          <button class="quick-icon" type="button" aria-label="첨부">＋</button>
          <textarea id="userInput" placeholder="예: 중학교 자유학기 프로그램으로 도입하려고 해. 10차시 운영안을 설명해줘." required></textarea>
          <button class="send" type="submit"><span>전송</span></button>
        </div>
        <div class="tools">
          <button class="tool" type="button" id="resetBtn">대화 초기화</button>
          <button class="tool" type="button" id="exportBtn">상담 요약 복사</button>
          <a class="tool" href="/admin.html">관리자</a>
        </div>
      </form>
    </section>
  </main>

  <script>

    const form = document.querySelector("#chatForm");
    const input = document.querySelector("#userInput");
    const nameInput = document.querySelector("#studentName");
    const goalInput = document.querySelector("#goal");

    };

    const defaultAdminSettings = {
      systemPrompt: "당신은 'AI 시대, 인간다움은 무엇일까?' 교육과정 전용 상담 챗봇입니다. 문서에 제시된 10차시 융합 교육과정을 바탕으로 학교 관리자, 교사, 학부모, 학생에게 친절하고 구체적으로 안내합니다. 답변은 생성형 AI 활용법을 넘어 비판적 사고, 디지털 시민성, 인간 고유성, 진로 성찰을 중심으로 구성합니다. 문서에 없는 운영 조건은 확정하지 말고 확인 질문으로 좁힙니다. 개인정보 입력은 요구하지 않습니다.",
      knowledgeBase: `교육명: AI 시대, 인간다움은 무엇일까? : 생성형 AI와 사고하는 법 / 2026 AI 기반 맞춤형 진로 설계 프로젝트.
핵심 배경: 생성형 AI가 과제 수행과 평가 방식을 바꾸고 있으므로, 교육은 단순 도구 활용을 넘어 AI와 함께 비판적으로 사고하고 검증하는 능력, 디지털 시민성, 인간 고유 역량을 길러야 한다.
운영 목적: 생성형 AI 원리 이해, 할루시네이션과 정보 교차 검증을 통한 Fact-check 역량 강화, 기술 사회 속 인간다움의 가치 재발견, 진로 탐색 결과를 꿈it(잇)다 2.0과 연계한 성장 이력 관리.
대상/시간: 중학교 재학생 20명 기준, 총 10회차, 회차당 45분. 문서 예시는 서울 빛나리 중학교 재학생 20명.
교육 방식: 블렌디드 러닝. 대면 실습/토론과 온라인 도구 활용을 결합한다. 활용 도구는 ChatGPT, Claude, Gemini 등 생성형 AI와 ThinkGym 토론 웹페이지.
10차시: 1차시 AI 기본 개념 - 생성형 AI 작동 원리와 활용 윤리 서약. 2차시 인간 고유 역할 - 오감/심리 조향 실습으로 인간 고유성 탐색. 3차시 미래 독서 토론 - 《먼저 온 미래》 기반 AI 공존 사회 비교 분석. 4차시 핵심 질문 도출 - ThinkGym을 활용한 논리적 프롬프트와 심화 질문 설계. 5차시 AI 팩트체크 - 할루시네이션 검증과 정보 교차 확인. 6차시 미래 직업 예측 - AI 대체 가능성 분석과 유망 직업 마인드맵. 7차시 논리 구조화 - 온라인 토론 플랫폼으로 주장 시각화와 논리 강화. 8차시 상호 피드백 - 동료 평가와 질문으로 비판적 사고 확장. 9차시 미래 선언서 - AI 시대 주역으로서의 나의 다짐 또는 모둠 선언서 작성. 10차시 진로 포트폴리오 - 꿈it(잇)다 2.0 데이터 업로드 및 최종 성찰.
설계 포인트: 비판적 사고, 성장 마인드셋, AI 및 인간 동료와의 협업, 감각 실습을 통한 정서 안정과 인간 고유 가치 통찰.
평가 방식: 포트폴리오 완성도 50%, 과정 참여도 30%, 자기성찰 일지 20%.
예산 예시: 1학급 20명 기준 총 3,080,000원. 강사비 1,500,000원, 심리 조향 키트 200,000원, 도서비 320,000원, ThinkGym 라이선스 300,000원, 교육과정 개발 및 워크북 700,000원, 운영관리비 60,000원.
기대 효과: 디지털 리터러시 향상, 미래 사회에 대한 능동적 태도, 선도적 디지털 인문학 교육 모델 구축, 꿈it(잇)다 2.0 학생별 진로 이력 데이터 확보, 경기공유학교 및 창의적 체험활동 확산 가능성.`,
      quickQuestions: [
        "10차시 커리큘럼을 한눈에 정리해줘",
        "학교에 제안할 때 핵심 설득 포인트는 뭐야?",
        "ThinkGym은 수업에서 어떻게 활용돼?",
        "평가 방식과 산출물을 설명해줘",
        "1학급 20명 기준 예산을 알려줘"
      ]
    };

    function getAdminSettings() {
      try {
        return { ...defaultAdminSettings, ...JSON.parse(localStorage.getItem("aiHumanityAdminSettings") || "{}") };
      } catch {
        return defaultAdminSettings;
      }
    }

    function renderQuickQuestions() {
      const settings = getAdminSettings();
      chipsEl.innerHTML = "";
      settings.quickQuestions.forEach((question) => {
        const chip = document.createElement("button");
        chip.className = "chip";
        chip.type = "button";
        chip.textContent = question;
        chipsEl.appendChild(chip);
      });
    }

    function mascotMarkup() {
      return `<div class="mascot mascot-mini" aria-hidden="true">
        <span class="robot-antenna"></span>
        <span class="robot-headset"></span>
        <span class="robot-face">
          <span class="robot-screen">
            <span class="robot-eye left"></span>
            <span class="robot-eye right"></span>
            <span class="robot-mouth"></span>
          </span>
        </span>
        <span class="robot-body"></span>
      </div>`;
    }

    function addMessage(role, text) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.innerHTML = `<strong>${role === "bot" ? "상담봇" : "사용자"}</strong>${escapeHtml(text)}`;

      if (role === "bot") {
        row.innerHTML = mascotMarkup();
        row.appendChild(div);
      } else {
        row.appendChild(div);
      }

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function detectNeeds(text) {
      const rules = [
        ["중학교", /중학|중학교|청소년|학생|자유학기/],
        ["학부모", /학부모|가정|안심|안전/],
        ["교사", /교사|수업|차시|활동|워크북|지도안/],
        ["학교 도입", /학교|기관|교육청|도입|제안|공유학교|창체|창의적/],
        ["AI 윤리", /윤리|개인정보|저작권|서약|안전/],
        ["팩트체크", /팩트|검증|할루시네이션|환각|출처/],
        ["진로", /진로|직업|꿈it|포트폴리오|마인드맵/],
        ["ThinkGym", /ThinkGym|토론|플랫폼|논리|주장/],
        ["예산", /예산|비용|금액|강사비|교구|라이선스/]
      ];
      rules.forEach(([need, regex]) => {
        if (regex.test(text)) state.needs.add(need);
      });
    }

    function buildResponse(text) {
      detectNeeds(text);

      const goal = goalInput.value;
      const course = courseMap[goal];
      const target = nameInput.value.trim() || "상담 대상";
      const needs = [...state.needs];
      const level = needs.includes("학생") || needs.includes("중학교") ? "중학생 맞춤" : "학교 운영 맞춤";
      const cadence = text.match(/주\s?\d회|매주|10회|10차시|45분|학기|방학/)?.[0] || "총 10회차, 회차당 45분 기준";
      const safety = needs.includes("AI 윤리") || state.persona === "parent" || needs.includes("팩트체크");

      state.recommended = course.title;

      const plan = [
        `상담 주제: ${course.title}`,
        `대상/운영 맥락: ${target}, ${level}`,
        `핵심 내용: ${course.contents}`,
        `수업 방식: 대면 실습/토론과 온라인 도구를 결합한 블렌디드 러닝`,
        `운영 시간: ${cadence}으로 설계된 10차시 과정입니다.`,
        `결과물: ${course.project}`
      ];

      if (safety) {
        plan.push("안전 장치: AI 활용 윤리 서약, 할루시네이션 검증, 정보 교차 확인, 개인정보 입력 금지를 수업 루틴에 포함합니다.");
      }

      if (needs.includes("기관 운영")) {
        plan.push("학교 도입 팁: 창의적 체험활동, 진로 연계, 경기공유학교 모델로 제안하고 꿈it(잇)다 2.0 기록 연계를 강조하면 좋습니다.");
      }

      if (needs.includes("실무 적용")) {
        plan.push("교사 운영 팁: 차시별 산출물과 자기성찰 일지를 미리 준비하면 포트폴리오 평가가 안정적으로 진행됩니다.");
      }

      const nextQuestion = "다음으로 학교급, 운영 차시, 대상 인원, 제안서/가정통신문/수업안 중 필요한 산출물을 알려주시면 더 정확히 정리해드릴게요.";
      return `${personaText[state.persona]}\n\n${plan.join("\n")}\n\n${nextQuestion}`;
    }

    async function requestChatbotResponse(text) {
      const fallback = buildResponse(text);
      const payload = {
        message: text,
        fallback,
        profile: {
          target: nameInput.value.trim(),
          goal: goalInput.value,
          persona: state.persona,
          needs: [...state.needs]
        },
        settings: getAdminSettings(),
        history: state.turns.slice(-8)
      };

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error("chat api failed");
        const data = await response.json();
        return data.reply || fallback;
      } catch {
        return fallback;
      }
    }

    function updateSummary() {
      const needs = [...state.needs].join(", ") || "아직 파악 중";
      const target = nameInput.value.trim() || "미입력";
      const text = `대상: ${target}
목표: ${goalInput.value}
상담 모드: ${document.querySelector(".persona[aria-pressed='true']").firstChild.textContent.trim()}
파악된 요구: ${needs}
추천 과정: ${state.recommended || "대화 후 추천"}`;
      summaryEl.textContent = text;
      localStorage.setItem("aiHumanityChatSummary", text);
    }

    async function handleUserText(text) {
      addMessage("user", text);
      state.turns.push({ role: "user", text });
      const loadingRow = addMessage("bot", "답변을 준비하고 있습니다...");
      loadingRow.querySelector(".message").classList.add("typing");
      const response = await requestChatbotResponse(text);
      loadingRow.remove();
      addMessage("bot", response);
      state.turns.push({ role: "bot", text: response });
      updateSummary();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      handleUserText(text);
    });

    chipsEl.addEventListener("click", (event) => {
      const chip = event.target.closest(".chip");
      if (chip) {
        input.value = chip.textContent;
        input.focus();
      }
    });

    personas.forEach((button) => {
      button.addEventListener("click", () => {
        personas.forEach((item) => item.setAttribute("aria-pressed", "false"));
        button.setAttribute("aria-pressed", "true");
        state.persona = button.dataset.persona;
        updateSummary();
      });
    });

    goalInput.addEventListener("change", updateSummary);
    nameInput.addEventListener("input", updateSummary);

    resetBtn.addEventListener("click", () => {
      state.turns = [];
      state.needs = new Set();
      state.recommended = "";
      messagesEl.innerHTML = "";
      localStorage.removeItem("aiHumanityChatSummary");
      addMessage("bot", "안녕하세요. 'AI 시대, 인간다움은 무엇일까?' 교육과정 상담을 도와드릴게요. 학교급, 대상 인원, 필요한 자료를 알려주시면 10차시 운영안과 도입 포인트를 정리해드리겠습니다.");
      updateSummary();
    });

    exportBtn.addEventListener("click", async () => {
      const text = summaryEl.textContent;
      try {
        await navigator.clipboard.writeText(text);
        exportBtn.textContent = "복사 완료";
      } catch {
        exportBtn.textContent = "복사 실패";
      }
      window.setTimeout(() => {
        exportBtn.textContent = "상담 요약 복사";
      }, 1400);
    });

    renderQuickQuestions();
    addMessage("bot", "안녕하세요. 'AI 시대, 인간다움은 무엇일까?' 교육과정 상담을 도와드릴게요. 학교급, 대상 인원, 필요한 자료를 알려주시면 10차시 운영안과 도입 포인트를 정리해드리겠습니다.");
    summaryEl.textContent = localStorage.getItem("aiHumanityChatSummary") || summaryEl.textContent;
    updateSummary();
  </script>
</body>
</html>
